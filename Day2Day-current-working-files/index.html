<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Day2Day</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main menu">
        <div class="brand-row">
          <div class="brand-lockup">
            <div class="brand-mark" id="brandInitial" aria-hidden="true">D</div>
            <span class="brand-name" id="brandName">Day2Day</span>
          </div>
          <button class="icon-button sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle menu" aria-expanded="true">
            <span aria-hidden="true"></span>
          </button>
        </div>

        <nav class="sidebar-nav" aria-label="Day2Day views">
          <button class="nav-item active" type="button" data-view="tasks" aria-current="page">
            <span class="clipboard-list-icon" aria-hidden="true"></span>
            <span>My List</span>
            <span class="nav-count" id="sidebarTaskCount" aria-label="0 tasks">0</span>
          </button>
          <button class="nav-item" type="button" data-view="status">
            <span class="status-ring-icon" aria-hidden="true"></span>
            <span>Status</span>
          </button>
        </nav>
      </aside>

      <div class="page">
        <header class="topbar">
          <div>
            <h1 id="greetingText">Hello 👋</h1>
            <p>Let's get things done today.</p>
          </div>
        </header>

        <main class="main-content">
          <section class="task-panel" aria-labelledby="taskHeading">
            <div class="task-header">
              <div>
                <h2 id="taskHeading">My List</h2>
              </div>
            </div>

            <div class="status-screen-tabs hidden" id="statusScreenTabs" aria-label="Task status filters">
              <button class="status-tab active" type="button" data-status="pending">
                <span>Pending</span>
                <span class="status-count" id="pendingCount">0</span>
              </button>
              <button class="status-tab" type="button" data-status="completed">
                <span>Completed</span>
                <span class="status-count" id="completedStatusCount">0</span>
              </button>
              <button class="status-tab" type="button" data-status="overdue">
                <span>Overdue</span>
                <span class="status-count" id="overdueCount">0</span>
              </button>
            </div>

            <div class="empty-state" id="emptyState">
              <button class="primary-button add-task-button" id="emptyAddButton" type="button">
                <span aria-hidden="true">+</span>
                <span>Add Task</span>
              </button>
            </div>

            <ul class="task-list" id="taskList" aria-label="Task list"></ul>

            <div class="add-row" id="addPrompt">
              <button class="add-prompt" id="showAddForm" type="button">+ Add Task</button>
            </div>

            <form class="task-card-form hidden" id="addForm">
              <button class="cancel-button" id="cancelAddTask" type="button" aria-label="Cancel new task">×</button>
              <div class="form-fields">
                <label class="sr-only" for="taskTitleInput">Task title</label>
                <input id="taskTitleInput" type="text" placeholder="Task title" autocomplete="off" />

                <label class="sr-only" for="taskDescriptionInput">Task description</label>
                <textarea id="taskDescriptionInput" rows="1" placeholder="Task description"></textarea>

                <div class="detail-meta-row hidden" id="detailMetaRow">
                  <span id="createdDateDetail">Created</span>
                </div>

                <div class="task-options-row">
                  <label class="date-field" id="dateField" for="taskDueDateInput">
                    <span aria-hidden="true">□</span>
                    <span class="date-value" id="dueDateText">Due Date</span>
                    <input id="taskDueDateInput" type="date" aria-label="Due date" />
                  </label>

                  <div class="priority-menu">
                    <button class="priority-button priority-none" id="priorityButton" type="button" aria-haspopup="listbox" aria-expanded="false">
                      <span class="flag-icon" aria-hidden="true"></span>
                      <span id="priorityText">Priority</span>
                    </button>
                    <div class="priority-options hidden" id="priorityOptions" role="listbox" aria-label="Priority level">
                      <button type="button" data-priority="none" role="option">
                        <span class="flag-icon priority-none" aria-hidden="true"></span>
                        <span>None</span>
                      </button>
                      <button type="button" data-priority="high" role="option">
                        <span class="flag-icon priority-high" aria-hidden="true"></span>
                        <span>High</span>
                      </button>
                      <button type="button" data-priority="medium" role="option">
                        <span class="flag-icon priority-medium" aria-hidden="true"></span>
                        <span>Medium</span>
                      </button>
                      <button type="button" data-priority="low" role="option">
                        <span class="flag-icon priority-low" aria-hidden="true"></span>
                        <span>Low</span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="form-actions">
                <button class="primary-button create-task-button" type="submit">Create Task</button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>

    <div class="name-modal hidden" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
      <form class="name-card" id="nameForm">
        <h2 id="nameModalTitle">Make Day2Day yours</h2>
        <label for="userNameInput">Your name</label>
        <input id="userNameInput" type="text" autocomplete="name" />
        <button class="primary-button" type="submit">Continue</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
